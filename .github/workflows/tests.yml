name: Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        # El paquete se importa como "jarvis_local", asi que el repo debe
        # clonarse en una carpeta con ese nombre y los tests correr desde el padre.
        uses: actions/checkout@v4
        with:
          path: jarvis_local

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: jarvis_local/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r jarvis_local/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check jarvis_local --output-format=github
        continue-on-error: true

      - name: Tests
        # Sin Ollama ni micro en el runner: los tests que los necesitan se
        # saltan solos (skipif) o usan dobles de prueba.
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest jarvis_local/test -v --tb=short

  security:
    name: Auditoria de seguridad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: jarvis_local

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar herramientas
        run: pip install bandit pip-audit

      - name: Bandit (codigo)
        run: bandit -r jarvis_local -ll --exclude jarvis_local/test
        continue-on-error: true

      - name: pip-audit (dependencias)
        run: pip-audit -r jarvis_local/requirements.txt
        continue-on-error: true

      - name: Verificar que no se suban secretos
        shell: bash
        run: |
          set -e
          for f in secrets.yaml credentials.json token.json; do
            if git -C jarvis_local ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "::error::$f esta versionado y no debe estarlo"
              exit 1
            fi
          done
          echo "OK: ningun archivo de credenciales esta versionado"
