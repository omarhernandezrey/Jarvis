# Configuracion por defecto de JARVIS Local

ollama:
  host: "http://localhost:11434"
  model: "qwen2.5:3b"
  timeout: 120
  num_ctx: 4096

jarvis:
  name: "JARVIS"
  language: "es"
  max_history: 20

safety:
  simulation_mode: true
  allowed_folders:
    - "%USERPROFILE%\\Documents"
    - "%USERPROFILE%\\Downloads"
    - "%USERPROFILE%\\Desktop"
  allowed_apps:
    - chrome
    - vscode
    - explorador
    - powershell
    - terminal

voice:
  stt_model: "base"
  stt_language: "es"
  stt_compute_type: "int8"
  stt_duration: 8
  stt_sample_rate: 16000
  stt_noise_floor: null
  stt_min_threshold: 0.00005
  tts_voice: "auto"
  tts_rate: 175
  tts_volume: 1.0
  tts_enabled: false

logging:
  dir: "logs"
  actions_log: "actions.log"
  errors_log: "errors.log"
