jarvis:
  language: es
  max_history: 20
  name: JARVIS
logging:
  actions_log: actions.log
  dir: logs
  errors_log: errors.log
ollama:
  host: http://localhost:11434
  model: qwen2.5:3b
  num_ctx: 2048
  num_predict: 120
  timeout: 600
safety:
  allowed_apps:
  - chrome
  - vscode
  - explorador
  - powershell
  - terminal
  - wsl
  allowed_folders:
  - '%USERPROFILE%\Documents'
  - '%USERPROFILE%\Downloads'
  - '%USERPROFILE%\Desktop'
  simulation_mode: false
voice:
  stt_compute_type: int8
  stt_duration: 8
  stt_language: es
  stt_min_threshold: 5.0e-05
  stt_model: small
  stt_noise_floor: 0.00033246
  stt_sample_rate: 16000
  tts_enabled: false
  tts_rate: 175
  tts_voice: auto
  tts_volume: 1.0
