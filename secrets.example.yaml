# JARVIS Local - Plantilla de secretos
# Copia este archivo como secrets.yaml (esta en .gitignore, NUNCA se sube a git)
# y completa solo lo que vayas a usar. Todo es opcional.

# --- Correo (para "envia un correo a...") ---
# Con Gmail: crea una "contrasena de aplicacion" en
# https://myaccount.google.com/apppasswords (NO uses tu contrasena normal)
email:
  address: "tu_correo@gmail.com"
  app_password: "xxxx xxxx xxxx xxxx"
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  # Contactos frecuentes: di "envia un correo a omar" y JARVIS resuelve la direccion
  contacts:
    yo: "tu_correo@gmail.com"

# --- WolframAlpha (para "pregunta a wolfram ...") ---
# Registra tu App ID gratis en https://developer.wolframalpha.com/
wolframalpha:
  app_id: "TU-APPID"

# --- Google Calendar (para "mis proximos eventos") ---
# 1. pip install google-api-python-client google-auth-oauthlib
# 2. Crea credenciales OAuth en https://console.cloud.google.com/apis/credentials
# 3. Descarga el JSON y guardalo como jarvis_local/credentials.json
#    (tambien esta en .gitignore)
google_calendar:
  enabled: false
